<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pergunta Importante</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        body { height: 100vh; margin: 0; display: flex; flex-direction: column; justify-content: center; align-items: center; background-color: #f0f0f0; font-family: sans-serif; overflow: hidden; }
        .container { text-align: center; z-index: 10; }
        
        #yoshi {
            position: fixed;
            bottom: 20px;
            left: 20px;
            width: 150px;
            transition: transform 0.3s;
        }

        #btn-sim { padding: 15px 30px; font-size: 18px; background-color: #27ae60; color: white; border: none; border-radius: 8px; cursor: pointer; margin: 10px; }
        
        #btn-nao { 
            position: absolute; 
            padding: 15px 30px; 
            font-size: 18px; 
            background-color: #ff4757; 
            color: white; 
            border: none; 
            border-radius: 8px; 
            cursor: pointer; 
            transition: all 0.3s ease; 
        }

        .comendo { transform: scale(0.1); opacity: 0; }
    </style>
</head>
<body>

    <img id="yoshi" src="yoshi-normal.png" alt="Yoshi">

    <div class="container">
        <h1>Você aceita namorar comigo?</h1>
        <button id="btn-sim" onclick="celebrar()">Sim</button>
        <button id="btn-nao">Não</button>
    </div>

    <script>
        const btnNao = document.getElementById('btn-nao');
        const yoshiImg = document.getElementById('yoshi');
        let contagem = 0; // Contador de tentativas

        btnNao.addEventListener('mouseover', fugir);
        btnNao.addEventListener('touchstart', fugir);

        function fugir() {
            contagem++;

            // Se chegar na 5ª vez, o Yoshi come e o botão desaparece para sempre
            if (contagem >= 5) {
                yoshiImg.src = "yoshi_comendo.png";
                btnNao.classList.add('comendo');
                setTimeout(() => {
                    btnNao.style.display = 'none'; // Some de vez
                    alert("O Yoshi comeu o botão! Você não tem mais escolha... 😏");
                }, 300);
                return; // Interrompe a função aqui
            }

            // Lógica normal de fugir
            yoshiImg.src = "yoshi_comendo.png";
            btnNao.classList.add('comendo');
            
            setTimeout(() => {
                const maxX = window.innerWidth - btnNao.offsetWidth - 20;
                const maxY = window.innerHeight - btnNao.offsetHeight - 20;
                
                const randomX = Math.floor(Math.random() * maxX);
                const randomY = Math.floor(Math.random() * maxY);

                btnNao.style.left = `${randomX}px`;
                btnNao.style.top = `${randomY}px`;
                
                btnNao.classList.remove('comendo');
                yoshiImg.src = "yoshi-normal.png";
            }, 300);
        }

        function celebrar() {
            confetti({ particleCount: 200, spread: 70, origin: { y: 0.6 } });
            exibirMensagem("Eu sabia! ❤️");
        }

        function exibirMensagem(texto) {
            const msg = document.createElement('div');
            msg.innerText = texto;
            msg.style.position = 'fixed';
            msg.style.top = '50%';
            msg.style.left = '50%';
            msg.style.transform = 'translate(-50%, -50%)';
            msg.style.fontSize = '40px';
            msg.style.fontWeight = 'bold';
            msg.style.color = '#ff4757';
            msg.style.backgroundColor = 'white';
            msg.style.padding = '20px';
            msg.style.borderRadius = '15px';
            msg.style.boxShadow = '0 0 20px rgba(0,0,0,0.2)';
            msg.style.zIndex = '1000';
            document.body.appendChild(msg);
            setTimeout(() => { msg.remove(); }, 3000);
        }
    </script>
</body>
</html>
