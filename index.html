<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pergunta Importante</title>
    <style>
        body {
            height: 100vh;
            margin: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-color: #f0f0f0;
            font-family: sans-serif;
        }
        .container {
            text-align: center;
        }
        #btn-sim {
            padding: 15px 30px;
            font-size: 18px;
            background-color: #27ae60;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            margin: 10px;
        }
        #btn-nao {
            position: absolute; /* Essencial para ele se mover pela tela */
            padding: 15px 30px;
            font-size: 18px;
            background-color: #ff4757;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.1s;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Você aceita namorar comigo?</h1>
        <button id="btn-sim" onclick="alert('Sabia que você diria sim! ❤️')">Sim</button>
        <button id="btn-nao">Não</button>
    </div>

    <script>
        const btnNao = document.getElementById('btn-nao');

        // Eventos para desktop e mobile
        btnNao.addEventListener('mouseover', fugir);
        btnNao.addEventListener('touchstart', fugir);

        function fugir() {
            // Calcula posição aleatória garantindo que o botão não saia da tela
            const x = Math.random() * (window.innerWidth - btnNao.offsetWidth);
            const y = Math.random() * (window.innerHeight - btnNao.offsetHeight);

            btnNao.style.left = `${x}px`;
            btnNao.style.top = `${y}px`;
        }
    </script>
</body>
</html>
