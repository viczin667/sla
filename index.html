<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pergunta Importante</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        body { height: 100vh; margin: 0; display: flex; flex-direction: column; justify-content: center; align-items: center; background-color: #f0f0f0; font-family: sans-serif; overflow: hidden; }
        .container { text-align: center; z-index: 10; }
        
        #yoshi {
            position: absolute; /* Essencial para mover pelo JS */
            width: 150px;
            transition: all 0.3s ease; /* Sincronizado com o movimento do botão */
            z-index: 5;
            transform: scaleX(-1);
        }

        #btn-sim { padding: 15px 30px; font-size: 18px; background-color: #27ae60; color: white; border: none; border-radius: 8px; cursor: pointer; margin: 10px; }
        
        #btn-nao { 
            position: absolute; 
            padding: 15px 30px; 
            font-size: 18px; 
            background-color: #ff4757; 
            color: white; 
            border: none; 
            border-radius: 8px; 
            cursor: pointer; 
            transition: all 0.3s ease; 
        }

        .comendo { transform: scale(0.1); opacity: 0; }
    </style>
</head>
<body>

    <img id="yoshi" src="yoshi_normal.png" alt="Yoshi">

    <div class="container">
        <h1>Você aceita namorar comigo?</h1>
        <button id="btn-sim" onclick="celebrar()">Sim</button>
        <button id="btn-nao">Não</button>
    </div>

    <script>
        const btnNao = document.getElementById('btn-nao');
        const yoshiImg = document.getElementById('yoshi');
        let contagem = 0;

        // Posição inicial do Yoshi para não ficar no canto
        yoshiImg.style.left = "50px";
        yoshiImg.style.top = "50px";

        btnNao.addEventListener('mouseover', fugir);
        btnNao.addEventListener('touchstart', fugir);

        function fugir() {
            contagem++;

            yoshiImg.src = "yoshi_comendo.png";
            btnNao.classList.add('comendo');
            
            setTimeout(() => {
                // Margens para o botão e o Yoshi não saírem da tela
                const maxX = window.innerWidth - 200; 
                const maxY = window.innerHeight - 100;
                
                const randomX = Math.max(50, Math.floor(Math.random() * maxX));
                const randomY = Math.max(50, Math.floor(Math.random() * maxY));

                // Move o botão
                btnNao.style.left = `${randomX}px`;
                btnNao.style.top = `${randomY}px`;

                // Move o Yoshi para o lado do botão (Offset de 100px)
                yoshiImg.style.left = `${randomX + 100}px`;
                yoshiImg.style.top = `${randomY}px`;
                if (randomX > window.innerWidth / 2) {
                    yoshiImg.style.transform = "scaleX(1)"; // Virado para a esquerda
                } 
                    else {
                    yoshiImg.style.transform = "scaleX(-1)"; // Virado para a direita
                }
                
                btnNao.classList.remove('comendo');
                yoshiImg.src = "yoshi_normal.png";

                if (contagem >= 5) {
                    btnNao.style.display = 'none';
                    yoshiImg.style.display = 'none';
                    alert("O Yoshi comeu o botão! Você não tem mais escolha... 😏");
                }
            }, 300);
        }

        function celebrar() {
            confetti({ particleCount: 200, spread: 70, origin: { y: 0.6 } });
            exibirMensagem("Eu sabia! ❤️");
        }

        function exibirMensagem(texto) {
            const msg = document.createElement('div');
            msg.innerText = texto;
            msg.style.position = 'fixed';
            msg.style.top = '50%';
            msg.style.left = '50%';
            msg.style.transform = 'translate(-50%, -50%)';
            msg.style.fontSize = '40px';
            msg.style.fontWeight = 'bold';
            msg.style.color = '#ff4757';
            msg.style.backgroundColor = 'white';
            msg.style.padding = '20px';
            msg.style.borderRadius = '15px';
            msg.style.boxShadow = '0 0 20px rgba(0,0,0,0.2)';
            msg.style.zIndex = '1000';
            document.body.appendChild(msg);
            setTimeout(() => msg.remove(), 3000);
        }
    </script>
</body>
</html>
