<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pergunta Importante</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <style>
        body { 
            height: 100vh; margin: 0; display: flex; flex-direction: column; 
            justify-content: center; align-items: center; background-color: #f0f0f0; 
            font-family: sans-serif; overflow: hidden; 
        }
        .container { text-align: center; z-index: 10; display: flex; flex-direction: column; align-items: center; gap: 20px; }
        
        #yoshi { position: absolute; width: 100px; transition: all 0.2s ease; z-index: 999; display: none; pointer-events: none; }
        
        #mario-wrapper { position: relative; width: 100px; height: 120px; margin-top: 20px; }
        #cano { width: 90px; position: absolute; bottom: 0; left: 5px; z-index: 2; }
        #mario { width: 60px; position: absolute; bottom: 0px; left: 20px; transition: all 0.6s ease; opacity: 0; z-index: 1; }
        #cogumelo { width: 40px; position: absolute; bottom: 30px; left: 30px; opacity: 0; transform: scale(0); transition: all 0.5s ease; z-index: 3; }

        .botoes { display: flex; justify-content: center; align-items: center; gap: 20px; height: 70px; }
        button { padding: 15px 30px; font-size: 18px; border: none; border-radius: 8px; cursor: pointer; }
        #btn-sim { background-color: #27ae60; color: white; }
        #btn-nao { background-color: #ff4757; color: white; position: fixed; transition: all 0.2s ease; }

        .animar-mario { opacity: 1 !important; transform: translateY(-90px); }
        .animar-cogumelo { opacity: 1 !important; transform: translateY(-60px) scale(1) !important; }
    </style>
</head>
<body>

    <div class="container">
        <h1>Tu é gay ?</h1>
        <div class="botoes">
            <button id="btn-sim">Sim</button>
            <button id="btn-nao">Não</button>
        </div>

        <div id="mario-wrapper">
            <img id="cano" src="cano.png" alt="Cano">
            <img id="mario" src="mario.png" alt="Mario">
            <img id="cogumelo" src="cogumelo.png" alt="Cogumelo">
        </div>
    </div>

    <img id="yoshi" src="yoshi_normal.png" alt="Yoshi">

    <script>
        const btnSim = document.getElementById('btn-sim');
        const btnNao = document.getElementById('btn-nao');
        const yoshi = document.getElementById('yoshi');

        function fugir(event) {
            if (event) event.preventDefault();
            
            // 1. Faz o botão sumir ao ser "comido"
            btnNao.style.visibility = 'hidden';
            
            yoshi.style.display = "block";
            yoshi.src = "yoshi_comendo.png";
            
            const maxX = window.innerWidth - 120;
            const maxY = window.innerHeight - 120;
            const newX = Math.max(20, Math.random() * maxX);
            const newY = Math.max(20, Math.random() * maxY);

            // 2. Define nova posição
            btnNao.style.left = `${newX}px`;
            btnNao.style.top = `${newY}px`;
            yoshi.style.left = `${newX + 40}px`;
            yoshi.style.top = `${newY - 50}px`;

            // 3. Reaparece após 0.5s
            setTimeout(() => {
                btnNao.style.visibility = 'visible';
                yoshi.src = "yoshi_normal.png";
            }, 500);
        }

        function vitoria() {
            document.querySelector('.botoes').style.display = 'none';
            document.querySelector('h1').innerText = "SABIA, VIADOOOO\n";
            
            const mario = document.getElementById('mario');
            const cogumelo = document.getElementById('cogumelo');
            
            mario.classList.add('animar-mario');
            setTimeout(() => {
                cogumelo.classList.add('animar-cogumelo');
                confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
            }, 500);
        }

        btnNao.addEventListener('mouseover', fugir);
        btnNao.addEventListener('touchstart', fugir, { passive: false });
        btnSim.addEventListener('click', vitoria);
    </script>
</body>
</html>
